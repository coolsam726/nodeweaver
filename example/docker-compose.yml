services:
  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - '4000:4000'
      - '3000:3000'
    environment:
      CI: "true"
      APP_UID: 1000
      APP_GID: 1000
      PORT: 4000
      ENABLE_WEB_PROXY: "true"
      WEB_DEV_URL: http://127.0.0.1:3000
      WEB_DEV_PORT: 3000
      WEB_DEV_HOST: 0.0.0.0
      API_BASE_SERVER: http://127.0.0.1:4000/api
      DATABASE_URL: "mongodb://mongodb:27017/example"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOOM_BRAND_NAME: Example Admin
      LOOM_BRAND_COPYRIGHT: "© 2026 Example Inc. All rights reserved."
      LOOM_BRAND_FONT_FAMILY: "Inter, ui-sans-serif, system-ui, sans-serif"
      LOOM_BRAND_FONT_URL: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      LOOM_BRAND_PRIMARY_COLOR: "#f1511b"
      LOOM_BRAND_ACCENT_COLOR: "#286291"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_api_node_modules:/app/apps/api/node_modules
      - app_web_node_modules:/app/apps/web/node_modules
    command: pnpm dev:docker

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  app_node_modules:
  app_api_node_modules:
  app_web_node_modules:
  mongodb_data:
  redis_data:
